<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Startup TG</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; color: #1e293b; max-width: 640px; margin: 0 auto; padding: 2rem; }
        header, footer { text-align: center; padding: 1.5rem 0; }
        a { color: #2563eb; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font: inherit; box-sizing: border-box; }
        textarea.form-control { min-height: 140px; resize: vertical; }
        .btn { display: inline-block; padding: 0.9rem 1.8rem; background: #2563eb; color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
        .flash { padding: 1rem; border-radius: 8px; margin-bottom: 1.25rem; }
        .flash.success { background: #dcfce7; color: #166534; }
        .flash.error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <header>
        <h1>Contactez Startup TG</h1>
        <p><a href="{% url 'home' %}">&larr; Retour à l'accueil</a></p>
    </header>

    <main>
        {% if messages %}
            {% for message in messages %}
                <p class="flash {{ message.tags }}">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'contact' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Nom complet</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="email">Adresse email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="recipient">Destinataire</label>
                <select id="recipient" name="recipient" class="form-control">
                    <option value="contact">Contact commercial (contact@startup.tg)</option>
                    <option value="info">Renseignements (info@startup.tg)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="subject">Sujet</label>
                <input type="text" id="subject" name="subject" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" class="form-control" required></textarea>
            </div>
            <button type="submit" class="btn">Envoyer le message</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Startup TG</p>
    </footer>
</body>
</html>
