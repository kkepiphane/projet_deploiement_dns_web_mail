resolver 127.0.0.11 valid=10s;

upstream django {
    # "web" est le nom du service Docker : la résolution DNS interne répartit
    # automatiquement la charge entre toutes les instances répliquées.
    server web:8000;
}

server {
    listen 80;
    server_name webapp1.startup.tg localhost;

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 443 ssl;
    server_name webapp1.startup.tg localhost;

    ssl_certificate     /etc/nginx/ssl/startup.tg.crt;
    ssl_certificate_key /etc/nginx/ssl/startup.tg.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}